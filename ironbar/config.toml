name = "bar"
anchor_to_edges = true
height = 42
position = "bottom"

[[start]]
type = "workspaces"
all_monitors = false
on_scroll_up = "swaymsg workspace prev_on_output"
on_scroll_down = "swaymsg workspace next_on_output"

[[center]]
type = "music"
player_type = "mpris"
format = " {title} / {artist}"
music_dir = "/home/jake/Music"
truncate = "end"

[center.icons]
