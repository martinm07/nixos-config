[drawing]
default_color = "yellow"
default_thickness = 5.0
default_font_size = 48.0

[ui]
status_bar_position = "top-right"

[session]
persist_transparent = true

[capture]
enabled = true
save_directory = "~/Pictures/screenshot"

[tablet]
enabled = false
pressure_enabled = true

# Thickness range for pressure mapping
min_thickness = 1.0
max_thickness = 8.0
